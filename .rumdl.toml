# rumdl configuration file

# Inherit settings from another config file (relative to this file's directory)
# extends = "../base.rumdl.toml"

# Global configuration options
[global]
# List of rules to disable (uncomment and modify as needed)
# disable = ["MD013", "MD033"]

# List of rules to enable exclusively (replaces defaults; only these rules will run)
# enable = ["MD001", "MD003", "MD004"]

# Additional rules to enable on top of defaults (additive, does not replace)
extend-enable = ["MD060", "MD070"]

# Additional rules to disable on top of the disable list (additive).
# MD013 (line length) is disabled: technical docs with code blocks, tables, and
# cross-reference links cannot be meaningfully wrapped at 120 chars without
# harming readability.  The entire existing docs corpus predates this rule
# being enforced; adding it now would only produce noise.
# MD041 is disabled because we use YAML front matter (required for markdownlint
# disable comments) as the first line in golden files.
# MD032 is disabled because the template uses inline list formatting (no blank
# line before list items in sub-sections) which is consistent and readable.
extend-disable = ["MD013", "MD032", "MD041"]

# List of file/directory patterns to include for linting (if provided, only these will be linted)
# include = [
#    "docs/*.md",
#    "src/**/*.md",
#    "README.md"
# ]

# List of file/directory patterns to exclude from linting
exclude = [
  # Common directories to exclude
  ".git",
  ".github",
  "node_modules",
  "vendor",
  "dist",
  "build",

  # Specific files or patterns
  "CHANGELOG.md",
  "LICENSE.md",
]

# Respect .gitignore files when scanning directories (default: true)
respect-gitignore = true

# Markdown flavor/dialect
flavor = "gfm"

# Rule-specific configurations (uncomment and modify as needed)

# [MD003]
# style = "atx"  # Heading style (atx, atx_closed, setext)

# [MD004]
# style = "asterisk"  # Unordered list style (asterisk, plus, dash, consistent)

# [MD007]
# indent = 4  # Unordered list indentation

# MD013 (line length) is disabled: technical docs with code blocks, tables, and
# cross-reference links cannot be meaningfully wrapped at 120 chars without
# harming readability.  The entire existing docs corpus predates this rule being
# enforced; adding it now would only produce noise with no benefit.
# [MD013]
# line-length = 120

# [MD044]
# names = ["rumdl", "Markdown", "GitHub"]  # Proper names that should be capitalized correctly
# code-blocks = false  # Check code blocks for proper names (default: false, skips code blocks)

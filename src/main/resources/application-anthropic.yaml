spring:
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.models.openai.AgentOpenAiAutoConfiguration

embabel:
  models:
    default-llm: claude-sonnet-4-6
    llms:
      generator: claude-sonnet-4-6
      repairer: claude-sonnet-4-6
      repair-label: claude-haiku-4-5
      repair-patch: claude-haiku-4-5
      repair-rewrite: claude-sonnet-4-6
      readiness-assessor: claude-haiku-4-5
      contract-extractor: claude-sonnet-4-6
      alignment-validator: claude-sonnet-4-6

bpmner:
  max-attempts: 8

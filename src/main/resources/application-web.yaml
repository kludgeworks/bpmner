spring:
  main:
    web-application-type: servlet

embabel:
  agent:
    shell:
      web-application-type: servlet
      interactive:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        # Actuator's web-exposure default is `health` only; `prometheus` must be listed
        # explicitly for /actuator/prometheus to be reachable (see docs/operator-guide.md).
        include: health,prometheus

spring:
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.models.openai.AgentOpenAiAutoConfiguration
      - com.embabel.agent.autoconfigure.models.gemini.AgentGeminiAutoConfiguration
      - com.embabel.agent.autoconfigure.models.anthropic.AgentAnthropicAutoConfiguration

embabel:
  agent:
    platform:
      models:
        mistralai:
          api-key: ${MISTRAL_API_KEY:}
      llm-operations:
        prompts:
          default-timeout: PT180S
  models:
    default-llm: mistral-medium-3-5
    llms:
      generator: mistral-medium-3-5
      repairer: mistral-medium-3-5
      repair-label: mistral-small-2506
      repair-patch: mistral-small-2506
      repair-rewrite: mistral-medium-3-5
      readiness-assessor: mistral-small-2506
      contract-extractor: mistral-medium-3-5
      alignment-validator: mistral-medium-3-5

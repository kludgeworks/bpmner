spring:
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.models.anthropic.AgentAnthropicAutoConfiguration
      - com.embabel.agent.autoconfigure.models.openai.AgentOpenAiAutoConfiguration

embabel:
  models:
    default-llm: openai/gpt-4.1
    llms:
      generator: openai/gpt-4.1
      repairer: openai/gpt-4.1
      repair-label: openai/gpt-4.1-nano
      repair-patch: openai/gpt-4.1-mini
      repair-rewrite: openai/gpt-4.1
      readiness-assessor: openai/gpt-4.1-mini
      contract-extractor: openai/gpt-4.1
      alignment-validator: openai/gpt-4.1
  agent:
    platform:
      models:
        github:
          api-key: ${GITHUB_TOKEN}

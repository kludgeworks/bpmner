spring:
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.models.anthropic.AgentAnthropicAutoConfiguration
      - com.embabel.agent.autoconfigure.models.openai.AgentOpenAiAutoConfiguration

embabel:
  models:
    default-llm: openai/gpt-4o
    llms:
      generator: openai/gpt-4o
      repairer: openai/gpt-4o
      repair-label: openai/gpt-4o-mini
      repair-patch: openai/gpt-4o-mini
      repair-rewrite: openai/gpt-4o
      readiness-assessor: openai/gpt-4o-mini
      contract-extractor: openai/gpt-4o
      alignment-validator: openai/gpt-4o
  agent:
    platform:
      models:
        github:
          api-key: ${GITHUB_TOKEN}

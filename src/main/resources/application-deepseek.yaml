spring:
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.models.openai.AgentOpenAiAutoConfiguration
      - com.embabel.agent.autoconfigure.models.gemini.AgentGeminiAutoConfiguration
      - com.embabel.agent.autoconfigure.models.anthropic.AgentAnthropicAutoConfiguration
      - com.embabel.agent.autoconfigure.models.mistralai.AgentMistralAiAutoConfiguration

embabel:
  agent:
    platform:
      models:
        deepseek:
          api-key: ${DEEPSEEK_API_KEY:}
      llm-operations:
        prompts:
          default-timeout: PT180S
  models:
    # DeepSeek exposes only deepseek-chat (V3) and deepseek-reasoner (R1). R1 has
    # weak/no function-calling + structured-output support, which contract extraction
    # depends on, so every role uses deepseek-chat.
    default-llm: deepseek-chat
    llms:
      generator: deepseek-chat
      repairer: deepseek-chat
      repair-label: deepseek-chat
      repair-patch: deepseek-chat
      repair-rewrite: deepseek-chat
      readiness-assessor: deepseek-chat
      contract-extractor: deepseek-chat
      alignment-validator: deepseek-chat

spring:
  application:
    name: bpmner
  main:
    web-application-type: none
  profiles:
    group:
      anth:
        - anthropic
        - verbose
      gh:
        - github
        - verbose

embabel:
  agent:
    shell:
      web-application-type: none
      interactive:
        enabled: true
        history-enabled: true

bpmner:
  max-attempts: 5
  logging:
    dir: ${BPMNER_LOG_DIR:${LOG_DIR:${BUILD_WORKING_DIRECTORY:${user.dir}}/logs}}
    dump-artifacts: false
  lint:
    extends:
      - plugin:bpmner/recommended-error
    rules:
      bpmner/act-01-verb-object-name: error
      bpmner/act-02-activity-label-capitalization: error
      bpmner/act-03-discouraged-business-verbs: error
      bpmner/act-12-loop-task-annotation: error
      bpmner/act-13-mi-task-annotation: error

spring:
  application:
    name: bpmner
  main:
    web-application-type: none
  profiles:
    group:
      anth:
        - anthropic
        - verbose
      gh:
        - github
        - verbose
      web:
        - web

embabel:
  models:
    llms:
      generator: gpt-4.1
      repair-label: gpt-4.1-nano
      repair-patch: gpt-4.1-mini
      repair-rewrite: gpt-4.1
      repairer: gpt-4.1-mini
  agent:
    shell:
      web-application-type: none
      interactive:
        enabled: true
        history-enabled: true

bpmner:
  max-attempts: 5
  logging:
    dir: ${BPMNER_LOG_DIR:${LOG_DIR:${BUILD_WORKING_DIRECTORY:${user.dir}}/logs}}
    # Default off. Override via env (`BPMNER_LOGGING_DUMP_ARTIFACTS=true`) or a dev/diagnostic
    # profile when investigating a failing run — intermediate XML is verbose at production scale.
    dump-artifacts: ${BPMNER_LOGGING_DUMP_ARTIFACTS:false}
  repair:
    abbreviations:
      ITBL: ineligible-to-board list
      PNR: booking reference
      FFP: frequent flyer programme
  rules:
    # Per-rule severity overrides. Keys are bare rule ids; values are one of
    # `error`, `warning`, `info`, `off`. See `RuleProfileFactory` (#242).
    #
    # Values MUST be quoted: in YAML 1.1 (which SnakeYAML follows by default),
    # bare `off`/`no`/`on`/`yes` are boolean literals. Spring Boot's binder
    # would convert the resulting Boolean to the string "false"/"true", which
    # the factory doesn't recognise — the rule would silently stay enabled.
    #
    # All three rules below were `off` in the pre-2G `bpmner.lint.rules` block
    # (deleted in PR #267). Their Pkl-declared severities are `warning`,
    # `warning`, and `error` respectively, so without the override they fire
    # on real runs — see #268 item D for the decision.
    severity-overrides:
      "act-verb-object-name": "off"              # #168 — business-verb allowlist too narrow; LLM cycles on camelCase composites
      "act-activity-label-capitalization": "off" # #170 — generator emits id-as-name (PascalCase); rule fires on every task
      "name-no-element-type-words": "off"        # #170 — same root cause; this one is `error` severity, so re-enabling can block production

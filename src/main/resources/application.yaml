spring:
  application:
    name: bpmner
  main:
    web-application-type: none

embabel:
  models:
    llms:
      generator: gpt-4.1
      repair-label: gpt-4.1-nano
      repair-patch: gpt-4.1-mini
      repair-rewrite: gpt-4.1
      repairer: gpt-4.1-mini
  agent:
    shell:
      web-application-type: none
      interactive:
        enabled: true
        history-enabled: true
    platform:
      observability:
        enabled: true
        capture-message-content: false

management:
  tracing:
    enabled: true
    sampling:
      probability: 0.1

bpmner:
  logging:
    dir: ${BPMNER_LOG_DIR:${LOG_DIR:${BUILD_WORKING_DIRECTORY:${user.dir}}/logs}}
    # Default off. Override via env (`BPMNER_LOGGING_DUMP_ARTIFACTS=true`) or a dev/diagnostic
    # profile when investigating a failing run — intermediate XML is verbose at production scale.
    dump-artifacts: ${BPMNER_LOGGING_DUMP_ARTIFACTS:false}
  # Rule profile and per-rule severity overrides are now sourced from bpmner.pkl (via
  # BpmnerLintConfig). To override the conventions source, set bpmner.rules.config-uri to a
  # file: URI pointing at a local bpmner.pkl that amends the packaged BpmnerLintConfig.pkl.

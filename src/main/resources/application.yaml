spring:
  application:
    name: bpmner
  main:
    web-application-type: none
  profiles:
    group:
      anth:
        - anthropic
        - verbose
      gh:
        - github
        - verbose

embabel:
  models:
    llms:
      generator: gpt-4.1
      repair-label: gpt-4.1-nano
      repair-patch: gpt-4.1-mini
      repair-rewrite: gpt-4.1
      repairer: gpt-4.1-mini
  agent:
    shell:
      web-application-type: none
      interactive:
        enabled: true
        history-enabled: true

bpmner:
  max-attempts: 5
  logging:
    dir: ${BPMNER_LOG_DIR:${LOG_DIR:${BUILD_WORKING_DIRECTORY:${user.dir}}/logs}}
    dump-artifacts: false
  repair:
    abbreviations:
      ITBL: ineligible-to-board list
      PNR: booking reference
      FFP: frequent flyer programme
  lint:
    extends:
      - plugin:bpmner/recommended-error
    rules:
      "[bpmner/act-verb-object-name]": error
      "[bpmner/act-activity-label-capitalization]": error
      "[bpmner/act-discouraged-business-verbs]": error
      "[bpmner/act-loop-task-annotation]": error
      "[bpmner/act-mi-task-annotation]": error

spring:
  application:
    name: bpmner
  main:
    web-application-type: none
  profiles:
    group:
      anth:
        - anthropic
        - verbose
      gh:
        - github
        - verbose

embabel:
  agent:
    shell:
      web-application-type: none
      interactive:
        enabled: true
        history-enabled: true

bpmner:
  max-attempts: 5
  logging:
    dir: ${BPMNER_LOG_DIR:${LOG_DIR:logs}}
    dump-artifacts: false

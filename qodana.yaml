####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
# Community linter — see https://www.jetbrains.com/help/qodana/linters.html.
# Coverage, CheckDependencyLicenses, taint/vulnerability analysis, and qodana-js
# require Ultimate; if we ever upgrade, switch back to qodana-jvm and re-add the
# `Generate JVM coverage` step + `--coverage-dir .qodana/code-coverage` arg.
linter: qodana-jvm-community

# Kotlin toolchain compiles to JVM 21 (tools/kotlin/BUILD.bazel: jvm_target = "21").
projectJDK: "21"

profile:
  name: qodana.recommended

bootstrap: bazel build //...

# Severity-based quality gate. Start conservative: fail only on critical/high
# until the baseline noise is triaged, then tighten. Once `qodana.sarif.json` is
# checked in as a baseline, switch the action to pr-mode and tighten thresholds.
failureConditions:
  severityThresholds:
    critical: 0
    high: 0

exclude:
  - name: All
    paths:
      # Bazel cache symlinks — point outside the workspace, never source
      - bazel-out
      - bazel-bin
      - bazel-testlogs
      - bazel-bpmner
      - bazel-qodana-setup
      # TypeScript / JS subprojects — JVM linter can't analyze them.
      # If you ever want JS analysis, add a separate qodana-js job (Ultimate-only).
      - linter
      - layout
      - web
      # Generated TypeScript (also git-ignored)
      - linter/src/generated
      # Node and build artefacts (defence in depth vs .bazelignore not being read)
      - node_modules
      - dist
      # Test sources — recommended-tier inspections produce a lot of noise here.
      - src/test
      # Non-source content
      - docs
      - styles
      - test/prose
      - logs
      # Tooling configs (Bazel files in tools/* are not Kotlin sources)
      - tools/vale
      # Local-state
      - .git
      - .idea
      - .claude
      - .serena

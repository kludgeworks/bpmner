name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

# Cancel superseded runs on the same branch — Qodana is slow with the Bazel bootstrap.
concurrency:
  group: qodana-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qodana:
    runs-on: ubuntu-latest
    # Don't run on fork PRs (QODANA_TOKEN is not available to forks).
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    permissions:
      contents: write
      pull-requests: write
      checks: write
      # Required by github/codeql-action/upload-sarif to write Code Scanning alerts.
      security-events: write
      # codeql-action calls the workflow-runs API for telemetry; without
      # actions:read the step fails with "Resource not accessible by integration".
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # check out the PR head commit, not the merge commit
          fetch-depth: 0  # full history required for pull request analysis

      # Cache Bazel disk + repository cache across runs. Bazel cold build inside
      # the Qodana container takes ~5-10 min; warm cache trims it to ~1-2 min.
      - name: Cache Bazel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-qodana-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc') }}
          restore-keys: |
            bazel-qodana-${{ runner.os }}-

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          experimental: true
          install: true

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@d7b5ec2fbec32197ef447c450e00589ed5f34fd5 #v2026.1.0
        with:
          # pr-mode auto-switches: changed-files-only on PRs, full scan on push.
          # Until we commit a baseline, the full scan on push is what populates
          # the dashboard; the PR-mode delta then becomes useful.
          post-pr-comment: true
          upload-result: true
          # Quality gates live in qodana.yaml -> failureConditions so they're
          # versioned alongside the rest of the linter config.
          args: >
            --linter qodana-jvm-community
            --within-docker false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_146944665 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'

      # Push SARIF to GitHub Code Scanning so issues appear in the Security tab and
      # as inline PR diff annotations. Runs even if the Qodana step failed on the
      # --fail-threshold so alerts still surface.
      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba #v4.35.5
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          # Distinguish Qodana alerts from any future CodeQL alerts in the Security tab.
          category: qodana

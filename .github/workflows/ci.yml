name: ci

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Verbose diagnostics across all tools (mise, hk, Bazel, CodeQL, Sonar)'
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  statuses: write
  actions: read

env:
  # Single switch fanned out to every tool. Set on workflow_dispatch when the
  # `debug` input is true; off otherwise. Each tool's verbose flag is wired
  # through this so a one-checkbox dispatch toggles them all in lockstep.
  DEBUG_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.debug && 'true' || 'false' }}
  MISE_VERBOSE: ${{ github.event_name == 'workflow_dispatch' && inputs.debug && '1' || '' }}
  HK_LOG: ${{ github.event_name == 'workflow_dispatch' && inputs.debug && 'debug' || '' }}
  # `--verbose_failures` always on (cheap, surfaces failing actions); `-s` only
  # when debug is requested (it prints every command, very loud).
  BAZEL_FLAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.debug && '--verbose_failures -s' || '--verbose_failures' }}

jobs:
  # The single heavy job: one Bazel cache, one mise install, one source tree.
  # Splitting lint/build/test/coverage/CodeQL across multiple jobs would force
  # cold Bazel caches (the disk-cache is per-runner) and double the wall-clock.
  # Per-step status in the GitHub UI is sufficient granularity.
  build:
    name: Build & analyze
    runs-on: ubuntu-latest
    outputs:
      coverage-outcome: ${{ steps.coverage.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Sonar needs full history for blame-age weighting

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          experimental: true
        env:
          MISE_LOCKED: 0  # core:java does not support multi-platform locking yet

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@8cb04a772ab4c1eb984e9c1b493a182e96c5e425 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          disk-cache: ci
          # PRs restore from shared caches but only main pushes new entries —
          # prevents fork PRs from poisoning shared caches.
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Lint
        run: hk check all

      - name: Initialize CodeQL (Java/Kotlin)
        id: codeql-init
        uses: github/codeql-action/init@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml
          debug: ${{ env.DEBUG_ENABLED == 'true' }}

      # `bazel coverage` does build + test + coverage report in one shot.
      # `--test_tag_filters=` overrides .bazelrc's `-integration` policy so the
      # integration tests (BpmnAlignmentFailureIntegrationTest,
      # BpmnValidationIntegrationTest, BpmnRepairAgentIntegrationTest) actually
      # run. Without this override they are silently skipped and Sonar's quality
      # gate is computed from misleading coverage. Running coverage instead of a
      # separate `bazel test` step also removes the previous duplicate-test-run
      # cost (the prior split ran tests once for ci, again for coverage).
      - name: Build, test (incl. integration), coverage
        id: coverage
        run: |
          # shellcheck disable=SC2086  # BAZEL_FLAGS must word-split to pass `-s` as a separate arg.
          bazel coverage //... \
            $BAZEL_FLAGS \
            --test_tag_filters= \
            --combined_report=lcov \
            --coverage_report_generator=@bazel_sonarqube//:sonarqube_coverage_generator \
            --instrumentation_filter="^//src,^//web,^//layout,^//linter,^//pkl"
          cp "$(realpath bazel-out/_coverage/_coverage_report.dat)" \
             "$GITHUB_WORKSPACE/coverage-report.xml"

      - name: Analyze CodeQL (Java/Kotlin)
        if: always() && steps.codeql-init.outcome == 'success'
        uses: github/codeql-action/analyze@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          category: /language:java-kotlin

      - name: Upload coverage artifact
        if: always() && steps.coverage.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: coverage-report
          path: coverage-report.xml
          if-no-files-found: error
          retention-days: 1

  # Lightweight CodeQL for non-JVM languages. Runs in parallel — no Bazel,
  # no mise, no pnpm — so it doesn't compete with the heavy job for the runner.
  codeql-static:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
          debug: ${{ env.DEBUG_ENABLED == 'true' }}

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          category: /language:${{ matrix.language }}

  # SonarCloud runs after coverage is available. Matrixed so backend and web
  # each surface their own status check and PR decoration. Fork-PR skip:
  # SONAR_TOKEN is not exposed to forks, so the scan would fail noisily.
  sonarcloud:
    name: SonarCloud (${{ matrix.project.name }})
    runs-on: ubuntu-latest
    needs: build
    if: >
      always() &&
      needs.build.outputs.coverage-outcome == 'success' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: Backend
            key: kludgeworks_bpmner_backend
            display_name: bpmner Backend
            sources: src/main/kotlin,linter,pkl,layout
          - name: Web
            key: kludgeworks_bpmner_web
            display_name: bpmner Web
            sources: web/src
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: coverage-report
          path: ${{ github.workspace }}

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            ${{ env.DEBUG_ENABLED == 'true' && '-X' || '' }}
            ${{ github.event_name == 'workflow_dispatch' && format('-Dsonar.branch.name={0}', github.ref_name) || '' }}
            -Dsonar.organization=kludgeworks
            -Dsonar.projectKey=${{ matrix.project.key }}
            -Dsonar.projectName=${{ matrix.project.display_name }}
            -Dsonar.sources=${{ matrix.project.sources }}
            -Dsonar.coverageReportPaths=${{ github.workspace }}/coverage-report.xml
            -Dsonar.qualitygate.wait=true

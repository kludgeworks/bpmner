name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual dispatch (free-text, optional)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read   # GitHub Models access for the e2e smoke step (#293)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0 # core:java does not support multi-platform locking yet

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Bazel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'WORKSPACE') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hk lint checks
        run: hk check all

      # Run every test discoverable in the build graph. e2e tests are gated out by
      # the `.bazelrc` policy (`test --test_tag_filters=-e2e`) and run in the next
      # step against the real GitHub Models LLM. Integration tests (mocked LLM) are
      # not filtered and run here on every push.
      - name: Build and run all tests
        run: bazel test //...

      - name: Run e2e smoke tests (real LLM)
        run: bazel test --test_tag_filters=e2e //src/test/...
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

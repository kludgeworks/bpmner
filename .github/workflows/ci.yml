name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual dispatch (free-text, optional)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Run hk lint checks
        run: hk check all

  test-unit:
    runs-on: ubuntu-latest
    # Fork PRs can't access org secrets (BUILDBUDDY_API_KEY / OP token), so the
    # RBE unit-test job would fail at "Load secrets". Skip it on forks, matching
    # smoke-tests and sonarcloud; same-repo PRs and pushes run the full suite.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: false
          repository-cache: true

      - name: Load secrets from 1Password
        uses: 1Password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          BUILDBUDDY_API_KEY: op://bpmner/buildbuddy/api-key

      - name: Build and run all tests
        # Unit tests exclude the live-llm/integration tags (see .bazelrc default
        # --test_tag_filters), so no LLM credentials are needed here. Withholding
        # them keeps the keys off the BuildBuddy remote-execution workers.
        run: |
          bazel test \
            --config=rbe \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            --test_output=errors \
            //...

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    # Skip on fork PRs — org secrets not available to external contributors
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false    # one flaky provider doesn't cancel the others
      matrix:
        include:
          - provider: anthropic
            shard_offset: 0
          - provider: openai
            shard_offset: 1
          - provider: gemini
            shard_offset: 2
          - provider: mistral
            shard_offset: 3
          - provider: deepseek
            shard_offset: 4
          - provider: llama
            shard_offset: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: false
          repository-cache: true
          cache-save: false

      - name: Load secrets from 1Password
        uses: 1Password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OPENAI_API_KEY: op://bpmner/openai/api-key
          ANTHROPIC_API_KEY: op://bpmner/anthropic/api-key
          GEMINI_API_KEY: op://bpmner/gemini/api-key
          MISTRAL_API_KEY: op://bpmner/mistral/api-key
          DEEPSEEK_API_KEY: op://bpmner/deepseek/api-key
          OPENROUTER_API_KEY: op://bpmner/openrouter/api-key
          BUILDBUDDY_API_KEY: op://bpmner/buildbuddy/api-key

      - name: Compute shard index for this run
        id: shard
        run: |
          # Rotate shard assignment every run so each test is validated on
          # each provider after N runs (where N is the matrix size). github.run_number is 1-based.
          SHARD_INDEX=$(( (${{ github.run_number }} + ${{ matrix.shard_offset }}) % ${{ strategy.job-total }} ))
          echo "SHARD_INDEX=$SHARD_INDEX" >> "$GITHUB_OUTPUT"
          echo "Provider ${{ matrix.provider }} running shard $SHARD_INDEX / ${{ strategy.job-total }} (run #${{ github.run_number }})"

      - name: Run smoke tests (${{ matrix.provider }}, shard ${{ steps.shard.outputs.SHARD_INDEX }}/${{ strategy.job-total }})
        # Live-LLM tests are non-deterministic in two independent ways: classification variance
        # (a weaker model occasionally mis-extracts) and latency (a single call can exceed the
        # per-test timeout). One automatic retry absorbs a transient flake without masking a real
        # regression — a genuine break fails both attempts.
        env:
          SPRING_PROFILES_ACTIVE: ${{ matrix.provider }}
        run: |
          bazel test \
            --test_tag_filters=live-llm,-manual \
            --flaky_test_attempts=2 \
            --test_env=OPENAI_API_KEY \
            --test_env=ANTHROPIC_API_KEY \
            --test_env=GEMINI_API_KEY \
            --test_env=MISTRAL_API_KEY \
            --test_env=DEEPSEEK_API_KEY \
            --test_env=OPENROUTER_API_KEY \
            --test_env=SPRING_PROFILES_ACTIVE \
            --test_env=TEST_TOTAL_SHARDS=${{ strategy.job-total }} \
            --test_env=TEST_SHARD_INDEX=${{ steps.shard.outputs.SHARD_INDEX }} \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            //src/test/... \
            --test_output=errors

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    needs: [test-unit]
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: false
          repository-cache: true
          cache-save: false

      - name: Load secrets from 1Password
        uses: 1Password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          BUILDBUDDY_API_KEY: op://bpmner/buildbuddy/api-key
          SONAR_TOKEN: op://bpmner/sonarqube/api-key

      - name: Run Bazel coverage
        id: coverage
        run: |
          bazel coverage //... \
            --config=ci \
            --strategy=CoverageReport=local \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            --combined_report=lcov \
            --coverage_report_generator=@bazel_sonarqube//:sonarqube_coverage_generator \
            --instrumentation_filter="^//src,^//web"
          cp "$(realpath bazel-out/_coverage/_coverage_report.dat)" "$GITHUB_WORKSPACE/coverage_report.dat"

      - name: SonarCloud Scan — Backend
        if: always() && steps.coverage.outcome != 'skipped'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bazel run //:sonar \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            -- \
            -Dsonar.organization=kludgeworks \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.coverageReportPaths="$GITHUB_WORKSPACE/coverage_report.dat"

      - name: SonarCloud Scan — Web
        if: always() && steps.coverage.outcome != 'skipped'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bazel run //web:sonar \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            -- \
            -Dsonar.organization=kludgeworks \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.coverageReportPaths="$GITHUB_WORKSPACE/coverage_report.dat"

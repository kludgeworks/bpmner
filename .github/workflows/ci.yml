name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual dispatch (free-text, optional)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v2
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hk lint checks
        run: hk check all

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v2
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'WORKSPACE') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Build and run all tests
        run: bazel test //...

  smoke-tests:
    runs-on: ubuntu-latest
    needs: test-unit
    # Skip on fork PRs — org secrets not available to external contributors
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false    # one flaky provider doesn't cancel the other two
      matrix:
        include:
          - provider: anth
            shard_offset: 0
          - provider: openai
            shard_offset: 1
          - provider: gemini
            shard_offset: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v2
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Restore Bazel cache (read-only)
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'WORKSPACE') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Load secrets from 1Password
        uses: 1Password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OPENAI_API_KEY: op://bpmner/openai/api-key
          ANTHROPIC_API_KEY: op://bpmner/anthropic/api-key
          GEMINI_API_KEY: op://bpmner/gemini/api-key

      - name: Compute shard index for this run
        id: shard
        run: |
          # Rotate shard assignment every run so each test is validated on
          # each provider after 3 runs. github.run_number is 1-based.
          SHARD_INDEX=$(( (${{ github.run_number }} + ${{ matrix.shard_offset }}) % 3 ))
          echo "SHARD_INDEX=$SHARD_INDEX" >> "$GITHUB_OUTPUT"
          echo "Provider ${{ matrix.provider }} running shard $SHARD_INDEX / 3 (run #${{ github.run_number }})"

      - name: Run smoke tests (${{ matrix.provider }}, shard ${{ steps.shard.outputs.SHARD_INDEX }}/3)
        env:
          SPRING_PROFILES_ACTIVE: ${{ matrix.provider }}
        run: |
          bazel test \
            --test_tag_filters=live-llm,-manual \
            --test_env=OPENAI_API_KEY \
            --test_env=ANTHROPIC_API_KEY \
            --test_env=GEMINI_API_KEY \
            --test_env=SPRING_PROFILES_ACTIVE \
            --test_env=TEST_TOTAL_SHARDS=3 \
            --test_env=TEST_SHARD_INDEX=${{ steps.shard.outputs.SHARD_INDEX }} \
            //src/test/... \
            --test_output=errors

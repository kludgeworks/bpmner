name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual dispatch (free-text, optional)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0 # core:java does not support multi-platform locking yet

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Bazel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'WORKSPACE') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hk lint checks
        run: hk check all

      # Run every test discoverable in the build graph. Integration tests are gated
      # out by the `.bazelrc` policy (`test --test_tag_filters=-integration`) and run
      # separately with `bazel test --test_tag_filters=integration //src/test/...`.
      # This matches the canonical Bazel pattern (`rules_pkl/.github/workflows/build.yml`)
      # and removes the allowlist-drift class of bug that hid `RepairRoutingModuleTest`
      # failures on main between Phase 2F (#243) and PR #249.
      - name: Build and run all tests
        run: bazel test //...

      - name: Run Smoke Tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          SPRING_PROFILES_ACTIVE: gh
        run: |
          bazel test \
            --test_tag_filters=live-llm \
            --test_env=GITHUB_TOKEN \
            --test_env=ANTHROPIC_API_KEY \
            --test_env=OPENAI_API_KEY \
            --test_env=SPRING_PROFILES_ACTIVE \
            //src/test/... \
            --test_output=errors

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual dispatch (free-text, optional)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          setup-bazel: "false"

      - name: Run hk lint checks
        run: hk check all

  test-unit:
    runs-on: ubuntu-latest
    # Fork PRs can't access org secrets (BUILDBUDDY_API_KEY), so the RBE unit-test
    # job would fail without credentials. Skip it on forks, matching smoke-tests and
    # sonarcloud; same-repo PRs and pushes run the full suite.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Build and run all tests
        # Unit tests exclude the live-llm/integration tags (see .bazelrc default
        # --test_tag_filters), so no LLM credentials are needed here. Withholding
        # them keeps the keys off the BuildBuddy remote-execution workers.
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          bazel test \
            --config=rbe \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            --test_output=errors \
            //...

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    # Skip on fork PRs (org secrets not available), draft PRs, and build-type commits
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && !startsWith(github.event.pull_request.title, 'build'))
    strategy:
      fail-fast: false    # one flaky provider doesn't cancel the others
      matrix:
        include:
          - provider: anthropic
            shard_offset: 0
          - provider: openai
            shard_offset: 1
          - provider: gemini
            shard_offset: 2
          - provider: mistral
            shard_offset: 3
          - provider: deepseek
            shard_offset: 4
          - provider: llama
            shard_offset: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          bazel-cache-save: "false"

      - name: Compute shard index for this run
        id: shard
        run: |
          # Rotate shard assignment every run so each test is validated on
          # each provider after N runs (where N is the matrix size). github.run_number is 1-based.
          SHARD_INDEX=$(( (${{ github.run_number }} + ${{ matrix.shard_offset }}) % ${{ strategy.job-total }} ))
          echo "SHARD_INDEX=$SHARD_INDEX" >> "$GITHUB_OUTPUT"
          echo "Provider ${{ matrix.provider }} running shard $SHARD_INDEX / ${{ strategy.job-total }} (run #${{ github.run_number }})"

      - name: Run smoke tests (${{ matrix.provider }}, shard ${{ steps.shard.outputs.SHARD_INDEX }}/${{ strategy.job-total }})
        # Live-LLM tests are non-deterministic in two independent ways: classification variance
        # (a weaker model occasionally mis-extracts) and latency (a single call can exceed the
        # per-test timeout). One automatic retry absorbs a transient flake without masking a real
        # regression — a genuine break fails both attempts.
        env:
          SPRING_PROFILES_ACTIVE: ${{ matrix.provider }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          bazel test \
            --test_tag_filters=live-llm,-manual \
            --flaky_test_attempts=2 \
            --test_env=OPENAI_API_KEY \
            --test_env=ANTHROPIC_API_KEY \
            --test_env=GEMINI_API_KEY \
            --test_env=MISTRAL_API_KEY \
            --test_env=DEEPSEEK_API_KEY \
            --test_env=OPENROUTER_API_KEY \
            --test_env=SPRING_PROFILES_ACTIVE \
            --test_env=GITHUB_RUN_NUMBER \
            --test_env=GITHUB_SHA \
            --test_env=GITHUB_HEAD_REF \
            --test_env=GITHUB_REF \
            --test_env=TEST_TOTAL_SHARDS=${{ strategy.job-total }} \
            --test_env=TEST_SHARD_INDEX=${{ steps.shard.outputs.SHARD_INDEX }} \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            //src/test/... \
            --test_output=errors

      - name: Collect smoke artifact
        if: always()
        run: |
          dest=smoke-artifact
          logs=bazel-testlogs/src/test/ContractVocabularySmokeTest
          mkdir -p "$dest"
          # The recorder writes smoke-results.jsonl into TEST_UNDECLARED_OUTPUTS_DIR; Bazel >=7 leaves
          # undeclared outputs loose under test.outputs/ instead of packaging them into an outputs.zip.
          cp "$logs/test.outputs/smoke-results.jsonl" "$dest/" 2>/dev/null || true
          cp "$logs/test.xml" "$dest/" 2>/dev/null || true
          cp -R "$logs/test_attempts" "$dest/" 2>/dev/null || true
          cp src/test/resources/prompt-baselines.json "$dest/" 2>/dev/null || true
          echo "Collected for ${{ matrix.provider }}:"
          ls -la "$dest" || true

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-${{ matrix.provider }}
          path: smoke-artifact/
          if-no-files-found: ignore
          retention-days: 7

  dispatch-smoke-history:
    needs: [smoke-tests]
    # After the matrix, trigger the data repo's ingest workflow (it pulls these artifacts + renders).
    # always() && !cancelled() so a failing provider is still ingested; the `!= 'skipped'` guard avoids
    # dispatching an ingest against a run that uploaded no artifacts (e.g. the matrix gated off); main
    # pushes / manual dispatch only. The mint+dispatch lives in the reusable dispatch-ingest workflow.
    if: always() && !cancelled() && needs.smoke-tests.result != 'skipped' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/dispatch-ingest.yml
    with:
      source_run_id: ${{ github.run_id }}
      sha: ${{ github.sha }}
    secrets: inherit

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    needs: [test-unit]
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          bazel-cache-save: "false"

      - name: Run Bazel coverage
        id: coverage
        run: |
          bazel coverage //... \
            --config=ci \
            --strategy=CoverageReport=local \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            --combined_report=lcov \
            --coverage_report_generator=@bazel_sonarqube//:sonarqube_coverage_generator \
            --instrumentation_filter="^//src,^//web"
          cp "$(realpath bazel-out/_coverage/_coverage_report.dat)" "$GITHUB_WORKSPACE/coverage_report.dat"

      - name: SonarCloud Scan — Backend
        if: success() && steps.coverage.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bazel run //:sonar \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            -- \
            -Dsonar.organization=kludgeworks \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.coverageReportPaths="$GITHUB_WORKSPACE/coverage_report.dat" \
            -Dsonar.coverage.exclusions="**/*Module.kt" \
            -Dsonar.cpd.exclusions="**/repair/internal/adapter/FlatBpmnDefinition*"

      - name: SonarCloud Scan — Web
        if: success() && steps.coverage.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bazel run //web:sonar \
            --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}" \
            -- \
            -Dsonar.organization=kludgeworks \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.coverageReportPaths="$GITHUB_WORKSPACE/coverage_report.dat"

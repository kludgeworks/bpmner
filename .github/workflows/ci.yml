name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'WORKSPACE') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hk lint checks
        run: hk check

      - name: Build and run CI test suite
        run: bazel test //:ci

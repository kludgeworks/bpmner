name: SonarCloud
on:
  push:
    branches:
      - main
      - 'releases/*'
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup mise
        uses: jdx/mise-action@5083123d9a0421256334f593845b736b4129759c # v2.1.11
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Bazel
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-sonar-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc') }}
          restore-keys: |
            bazel-sonar-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Bazel coverage
        run: |
          # Generate combined LCOV coverage report
          bazel coverage //... --combined_report=lcov --instrumentation_filter="^//src,^//linter,^//web"

      - name: Prepare Coverage Reports
        run: |
          # 1. Convert LCOV to JaCoCo XML for the backend (root src/)
          node tools/coverage/lcov_to_jacoco.mjs bazel-out/_coverage/_coverage_report.dat jacoco.xml
          
          # 2. Correctly extract project-specific LCOV data using awk
          # For linter: Extract blocks where SF starts with linter/ and strip the prefix
          awk '/^SF:linter\// {p=1} p {line=$0; if (line ~ /^SF:linter\//) sub(/^SF:linter\//, "SF:", line); print line} /^end_of_record/ {p=0}' bazel-out/_coverage/_coverage_report.dat > linter_coverage.lcov
          
          # For web: Extract blocks where SF starts with web/ and strip the prefix
          awk '/^SF:web\// {p=1} p {line=$0; if (line ~ /^SF:web\//) sub(/^SF:web\//, "SF:", line); print line} /^end_of_record/ {p=0}' bazel-out/_coverage/_coverage_report.dat > web_coverage.lcov

      - name: SonarCloud Scan (Backend)
        uses: SonarSource/sonarcloud-github-action@cb2da3322a36b3b552f754763156942c759368d0 # v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kludgeworks_bpmner_backend
            -Dsonar.organization=kludgeworks
            -Dsonar.sources=src
            -Dsonar.coverage.jacoco.xmlReportPaths=jacoco.xml

      - name: SonarCloud Scan (Linter)
        uses: SonarSource/sonarcloud-github-action@cb2da3322a36b3b552f754763156942c759368d0 # v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: linter
          args: >
            -Dsonar.projectKey=kludgeworks_bpmner_linter
            -Dsonar.organization=kludgeworks
            -Dsonar.javascript.lcov.reportPaths=../linter_coverage.lcov

      - name: SonarCloud Scan (Web)
        uses: SonarSource/sonarcloud-github-action@cb2da3322a36b3b552f754763156942c759368d0 # v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: web
          args: >
            -Dsonar.projectKey=kludgeworks_bpmner_web
            -Dsonar.organization=kludgeworks
            -Dsonar.javascript.lcov.reportPaths=../web_coverage.lcov

name: SonarCloud
on:
  push:
    branches:
      - main
      - 'releases/*'
  pull_request:
    types: [opened, synchronize, reopened]
  # Manual dispatch lets us validate the multi-project setup on a feature branch
  # before merging — pull_request runs use the BASE branch's workflow file, so
  # the new multi-project version can only be tested via push-to-main or this trigger.
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual dispatch (free-text, optional)'
        required: false

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Bazel
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-sonar-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc') }}
          restore-keys: |
            bazel-sonar-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Bazel coverage
        run: |
          # Generate coverage reports using the bazel-sonarqube coverage generator
          # (converts Kotlin JaCoCo + JS LCOV into the SonarQube generic-coverage XML
          # format expected by sonar.coverageReportPaths).
          bazel coverage //... \
            --combined_report=lcov \
            --coverage_report_generator=@bazel_sonarqube//:sonarqube_coverage_generator \
            --instrumentation_filter="^//src,^//linter,^//web"
          # Stage the combined report at a stable absolute path so the sonar-scanner
          # (which runs from the bazel runfiles tree as its CWD) can resolve it.
          cp "$(realpath bazel-out/_coverage/_coverage_report.dat)" "$GITHUB_WORKSPACE/coverage_report.dat"

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Use the idiomatic Bazel sonarqube runner for each project key.
          # This ensures that analysis is pushed to the 3 separate projects
          # defined in the SonarCloud dashboard. Each gets the same combined
          # coverage report — SonarCloud only credits coverage for files that
          # are in the project's analyzed `srcs`, so per-language scoping
          # happens server-side automatically.
          COVERAGE_REPORT_PATH="$GITHUB_WORKSPACE/coverage_report.dat"

          echo "Scanning Backend..."
          bazel run //:sonar -- \
            -Dsonar.organization=kludgeworks \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverageReportPaths="$COVERAGE_REPORT_PATH"

          echo "Scanning Linter..."
          bazel run //linter:sonar -- \
            -Dsonar.organization=kludgeworks \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverageReportPaths="$COVERAGE_REPORT_PATH"

          echo "Scanning Web..."
          bazel run //web:sonar -- \
            -Dsonar.organization=kludgeworks \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverageReportPaths="$COVERAGE_REPORT_PATH"

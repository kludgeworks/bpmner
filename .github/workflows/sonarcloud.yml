name: SonarCloud
on:
  push:
    branches:
      - main
      - 'releases/*'
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-sonar-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc') }}
          restore-keys: |
            bazel-sonar-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Bazel coverage
        run: |
          # Generate combined LCOV coverage report
          bazel coverage //... --combined_report=lcov --instrumentation_filter="^//src,^//linter,^//web"

      - name: Prepare Coverage Reports
        run: |
          # 1. Convert LCOV to JaCoCo XML for the backend
          node tools/coverage/lcov_to_jacoco.mjs bazel-out/_coverage/_coverage_report.dat jacoco.xml
          
          # 2. Create a linter-specific LCOV report with relative paths
          grep -E "^(SF:linter/|DA:|end_of_record)" bazel-out/_coverage/_coverage_report.dat | sed 's/SF:linter\//SF:/g' > linter_coverage.lcov
          
          # 3. Create a web-specific LCOV report (if/when tests exist)
          grep -E "^(SF:web/|DA:|end_of_record)" bazel-out/_coverage/_coverage_report.dat | sed 's/SF:web\//SF:/g' > web_coverage.lcov

      - name: SonarCloud Scan (Backend)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kludgeworks_bpmner_backend
            -Dsonar.organization=kludgeworks
            -Dsonar.sources=src
            -Dsonar.coverage.jacoco.xmlReportPaths=jacoco.xml

      - name: SonarCloud Scan (Linter)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: linter
          args: >
            -Dsonar.projectKey=kludgeworks_bpmner_linter
            -Dsonar.organization=kludgeworks
            -Dsonar.javascript.lcov.reportPaths=../linter_coverage.lcov

      - name: SonarCloud Scan (Web)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: web
          args: >
            -Dsonar.projectKey=kludgeworks_bpmner_web
            -Dsonar.organization=kludgeworks
            -Dsonar.javascript.lcov.reportPaths=../web_coverage.lcov

#:schema https://mise.jdx.dev/schema/mise.json

[tools]
bazelisk = "latest"
java = "liberica-nik-openjdk25-25.0.3+1"
node = "24"
"npm:pnpm" = "11.0.8"
hk = "latest"
pkl = "latest"
biome = "latest"
ktlint = "1.6.0"                                                                                                                                               # match rules_kotlin@2.3.20 bundled ktlint; bump together when rules_kotlin updates
buildifier = "latest"
taplo = "latest"
shfmt = "latest"
shellcheck = "latest"
vale = "latest"
rumdl = "latest"
"github:detekt/detekt" = { version = "1.23.8", asset_pattern = "detekt-cli-{version}.zip", bin_path = "detekt-cli-{version}/bin", filter_bins = "detekt-cli" }
actionlint = "latest"
"github:google/addlicense" = "latest"
coursier = "latest"
gh = "latest"

[env]
HK_MISE = 1
LICENSE_TYPE = "mit"
LICENSE_HOLDER = "The Project Contributors"

[settings]
experimental = true
lockfile = true

[task_config]
includes = [".mise/tasks.toml", "tasks.toml", "mise-tasks"]

[hooks]
postinstall = 'hk install --mise && vale sync && { [[ -n "${CI}" ]] || cs launch org.jetbrains.bsp:bazel-bsp:3.2.0 -M org.jetbrains.bsp.bazel.install.Install; }'

[tasks.native-trace]
description = "Run the application with the native-image-agent to generate metadata"
run = """
bazel build //src:bpmner_app
rm -rf src/native-config
mkdir -p src/native-config
java -agentlib:native-image-agent=config-output-dir=src/native-config \
  -Dspring.profiles.active=githubmodels \
  -Dspring.main.web-application-type=none \
  -Dspring.shell.interactive.enabled=false \
  -jar bazel-bin/src/bpmner_app.jar \
  generate "review process for code review"

if [ ! -f src/native-config/reachability-metadata.json ]; then
  echo "Error: reachability-metadata.json was not generated!"
  exit 1
fi

node -e "
const fs = require('fs');
const path = require('path');
const metadataFile = 'src/native-config/reachability-metadata.json';
if (!fs.existsSync(metadataFile)) { console.error('reachability-metadata.json not found'); process.exit(1); }
const metadata = JSON.parse(fs.readFileSync(metadataFile, 'utf8'));
const legacyEntries = [
  // Kotlin reflection is loaded at native runtime but not exercised by the representative LLM request.
  { name: 'kotlin.reflect.jvm.internal.ReflectionFactoryImpl', allDeclaredConstructors: true },
];
const reflectMap = new Map(legacyEntries.map(e => [e.name, e]));
const proxies = [];
if (metadata.reflection) {
  for (const item of metadata.reflection) {
    const rawType = item.type;
    if (!rawType) continue;
    if (typeof rawType === 'object') {
      if (rawType.proxy) {
        if (!rawType.proxy.some(p => p.startsWith('org.pkl.') || p.startsWith('com.oracle.truffle.') || p.startsWith('org.graalvm.') || p.toLowerCase().includes('pkl'))) {
          proxies.push(rawType.proxy);
        }
      }
      continue;
    }
    const className = rawType;
    if (className.startsWith('org.pkl.') || className.startsWith('com.oracle.truffle.') || className.startsWith('org.graalvm.') || className.toLowerCase().includes('pkl')) {
      continue;
    }
    const existing = reflectMap.get(className) || { name: className };
    if (item.allDeclaredConstructors || item.allPublicConstructors) existing.allDeclaredConstructors = true;
    if (item.allDeclaredFields || item.allPublicFields) existing.allDeclaredFields = true;
    if (item.allDeclaredMethods || item.allPublicMethods) existing.allDeclaredMethods = true;
    if (item.methods) {
      existing.methods = existing.methods || [];
      const methodKey = m => m.name + '(' + (m.parameterTypes || []).join(',') + ')';
      const existingMethods = new Map(existing.methods.map(m => [methodKey(m), m]));
      for (const m of item.methods) {
        if (!existingMethods.has(methodKey(m))) existing.methods.push(m);
      }
    }
    if (item.fields) {
      existing.fields = existing.fields || [];
      const existingFields = new Set(existing.fields.map(f => f.name));
      for (const f of item.fields) {
        if (!existingFields.has(f.name)) existing.fields.push(f);
      }
    }
    reflectMap.set(className, existing);
  }
}
const sortedReflect = Array.from(reflectMap.values()).filter(a => a && typeof a.name === 'string').sort((a, b) => a.name.localeCompare(b.name));

const outDir = 'src/native-config/META-INF/native-image/dev.groknull.bpmner';
fs.mkdirSync(outDir, { recursive: true });

fs.writeFileSync(path.join(outDir, 'reflect-config.json'), JSON.stringify(sortedReflect, null, 2) + '\\n');
fs.writeFileSync(path.join(outDir, 'proxy-config.json'), JSON.stringify(proxies, null, 2) + '\\n');

const resourceIncludes = [];
const bundles = [];
if (metadata.resources) {
  const seenPatterns = new Set();
  for (const item of metadata.resources) {
    if (item.glob || item.pattern) {
      const val = item.glob || item.pattern;
      if (val.includes('org/pkl') || val.includes('truffle') || val.includes('graalvm') || val.includes('org.pkl')) {
        continue;
      }
      let patternStr = item.pattern;
      if (!patternStr && item.glob) {
        patternStr = item.glob
          .replace(/[.+^$\\[\\]{}()|]/g, '\\\\$&')
          .replace(/\\*\\*/g, '.*')
          .replace(/\\*/g, '[^/]*')
          .replace(/\\?/g, '.');
      }
      if (!seenPatterns.has(patternStr)) {
        seenPatterns.add(patternStr);
        const entry = {};
        entry.pattern = patternStr;
        resourceIncludes.push(entry);
      }
    } else if (item.bundle) {
      bundles.push({ name: item.bundle });
    }
  }
}
fs.writeFileSync(path.join(outDir, 'resource-config.json'), JSON.stringify({ resources: { includes: resourceIncludes }, bundles: bundles }, null, 2) + '\\n');
console.log('Successfully formatted and merged metadata!');
"
mise run native-trace-check
"""

[tasks.native-trace-check]
description = "Validate checked-in native image metadata"
run = """
config_dir=src/native-config/META-INF/native-image/dev.groknull.bpmner
test -f "$config_dir/reflect-config.json"
test -f "$config_dir/proxy-config.json"
test -f "$config_dir/resource-config.json"
output_dir=$(mktemp -d)
trap 'rm -rf "$output_dir"' EXIT
native-image-configure generate --input-dir="$config_dir" --output-dir="$output_dir"
"""

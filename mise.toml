#:schema https://mise.jdx.dev/schema/mise.json

[tools]
bazelisk = "latest"
java = "liberica-nik-openjdk25-25.0.3+1"
node = "24"
"npm:pnpm" = "11.0.8"
hk = "latest"
pkl = "latest"
biome = "latest"
ktlint = "latest"
buildifier = "latest"
taplo = "latest"
shfmt = "latest"
shellcheck = "latest"
vale = "latest"
"github:detekt/detekt" = { version = "1.23.8", asset_pattern = "detekt-cli-{version}.zip", bin_path = "detekt-cli-{version}/bin", filter_bins = "detekt-cli" }
actionlint = "latest"
"github:google/addlicense" = "latest"

[env]
HK_MISE = 1
LICENSE_TYPE = "mit"
LICENSE_HOLDER = "The Project Contributors"

[settings]
experimental = true
lockfile = true

[deps.pnpm]
auto = true

[task_config]
includes = [".mise/tasks.toml", "tasks.toml"]

[hooks]
postinstall = "hk install --mise && vale sync && mise deps install"

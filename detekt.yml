config:
  validation: true
  warningsAsErrors: true
  checkExhaustiveness: false

build:
  maxIssues: 0

style:
  MaxLineLength:
    maxLineLength: 130
  UnusedParameter:
    active: true
    allowedNames: '(_.*)'
  ReturnCount:
    active: true
    max: 4
    excludeGuardClauses: true
    excludeReturnFromLambda: true

naming:
  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z_][A-Za-z0-9]*'

complexity:
  TooManyFunctions:
    active: true
    ignoreOverridden: true
    # Embabel's planner creates one Action/Condition per annotated method, so framework-dispatched
    # methods are a structural floor, not a cohesion smell — exclude them from the function count.
    ignoreAnnotatedFunctions: ['Action', 'Condition']
  LongParameterList:
    active: true
    constructorThreshold: 10
  LongMethod:
    active: true
    # The Kotlin docs renderer uses buildString to construct markdown content.
    # Extracting parts into separate functions would harm readability by splitting
    # the template logic across multiple methods. 60 is too restrictive here.
    threshold: 100
  NestedBlockDepth:
    active: true
    # The golden-file test uses nested try blocks to manage test context and
    # compare rendered output. Reducing nesting would harm readability.
    threshold: 5

performance:
  SpreadOperator:
    active: false

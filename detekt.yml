config:
  validation: true
  warningsAsErrors: true
  checkExhaustiveness: false

build:
  maxIssues: 0

style:
  MaxLineLength:
    maxLineLength: 130
  UnusedParameter:
    active: true
    allowedNames: '(_.*)'
  ReturnCount:
    active: true
    max: 4
    excludeGuardClauses: true
    excludeReturnFromLambda: true

naming:
  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z_][A-Za-z0-9]*'

complexity:
  TooManyFunctions:
    active: true
    ignoreOverridden: true
    # Framework-dispatched methods are a structural floor, not a cohesion smell:
    # - Action / Condition: Embabel's planner creates one planning node per annotated method.
    # - Test: JUnit discovers and dispatches each @Test method independently.
    # Exclude all three from the function count to avoid spurious TooManyFunctions violations.
    ignoreAnnotatedFunctions: ['Action', 'Condition', 'Test']
  LongParameterList:
    active: true
    constructorThreshold: 10

performance:
  SpreadOperator:
    active: false

#:schema https://mise.jdx.dev/schema/mise-task.json

[gh-models]
description = "List the GitHub Models catalog (table / CSV / JSON) [nushell]"
tools = { "github:nushell/nushell" = "latest" }
usage = '''
flag "-f --format <format>" help="Output format" default="table" {
  choices "table" "csv" "json"
}
flag "-p --publisher <publisher>" help="Filter by publisher name (case-insensitive)"
'''
run = '''
#!/usr/bin/env nu

# ── helpers ───────────────────────────────────────────────────────────────────

# Accepts int or nothing (null fields in the API response)
def humanize [n] {
  if ($n == null) {
    "-"
  } else if ($n >= 1_000_000) {
    $"(($n / 1_000_000 | math round))M"
  } else if ($n >= 1_000) {
    $"(($n / 1_000 | math round))K"
  } else {
    $"($n)"
  }
}

def shorten-caps [caps: list<string>] {
  $caps | each {|c|
    $c | str replace "tool-calling" "tools"
       | str replace "streaming"    "stream"
  } | str join "+"
}

# ── args (injected by mise from the `usage` field above) ─────────────────────
let format    = ($env | get -o usage_format    | default "table")
let publisher = ($env | get -o usage_publisher | default "")

# ── fetch ─────────────────────────────────────────────────────────────────────
let token = (gh auth token | str trim)

# URL must be on the same line as `http get` — nushell parses a bare string
# literal on its own line as a new pipeline stage, not a positional argument.
let url = "https://models.github.ai/catalog/models"
let models = (http get --headers {
  Accept:                 "application/vnd.github+json"
  Authorization:          $"Bearer ($token)"
  "X-GitHub-Api-Version": "2026-03-10"
} $url)

# ── filter + sort ─────────────────────────────────────────────────────────────
let filtered = if ($publisher | is-empty) {
  $models
} else {
  $models | where {|m|
    ($m.publisher | str downcase | str contains ($publisher | str downcase))
  }
}

let sorted = $filtered | sort-by publisher name

# ── render ────────────────────────────────────────────────────────────────────
if $format == "json" {

  $sorted | to json

} else if $format == "csv" {

  $sorted | each {|m| {
    id:                $m.id
    name:              $m.name
    publisher:         $m.publisher
    rate_limit_tier:   ($m.rate_limit_tier? | default "-")
    max_input_tokens:  $m.limits.max_input_tokens
    max_output_tokens: $m.limits.max_output_tokens
    capabilities:      ($m.capabilities | str join "+")
    input_modalities:  ($m.supported_input_modalities | str join "+")
    output_modalities: ($m.supported_output_modalities | str join "+")
    tags:              ($m.tags | str join "+")
  }} | to csv

} else {

  $sorted | each {|m| {
    id:        $m.id
    tier:      ($m.rate_limit_tier? | default "-")
    "ctx-in":  (humanize $m.limits.max_input_tokens)
    "ctx-out": (humanize $m.limits.max_output_tokens)
    caps:      (shorten-caps $m.capabilities)
    inputs:    ($m.supported_input_modalities | str join "+")
    tags:      ($m.tags | str join ",")
  }} | table

}
'''

[anthropic-models]
description = "List the Anthropic models catalog (table / CSV / JSON) [nushell]"
tools = { "github:nushell/nushell" = "latest" }
usage = '''
flag "-f --format <format>" help="Output format" default="table" {
  choices "table" "csv" "json"
}
'''
run = '''
#!/usr/bin/env nu

# ── helpers ───────────────────────────────────────────────────────────────────

# Accepts int or nothing
def humanize [n] {
  if ($n == null) {
    "-"
  } else if ($n >= 1_000_000) {
    $"(($n / 1_000_000 | math round))M"
  } else if ($n >= 1_000) {
    $"(($n / 1_000 | math round))K"
  } else {
    $"($n)"
  }
}

def get-caps [m] {
  let caps = []
  let c = ($m.capabilities? | default {})

  let caps = if ($c.image_input? | default {} | get -o supported | default false) { $caps | append "vision" } else { $caps }
  let caps = if ($c.thinking? | get -o types | default {} | get -o adaptive | default {} | get -o supported | default false) { $caps | append "thinking" } else { $caps }
  let caps = if ($c.structured_outputs? | default {} | get -o supported | default false) { $caps | append "json" } else { $caps }

  $caps | str join "+"
}

# ── args (injected by mise from the `usage` field above) ─────────────────────
let format = ($env | get -o usage_format | default "table")

# ── fetch ─────────────────────────────────────────────────────────────────────
let api_key = ($env.ANTHROPIC_API_KEY? | default "")
if ($api_key | is-empty) {
  print "Error: ANTHROPIC_API_KEY environment variable is not set."
  exit 1
}

let url = "https://api.anthropic.com/v1/models"
let response = (http get --headers {
  "x-api-key":         $api_key
  "anthropic-version": "2023-06-01"
} $url)

let models = $response.data

# ── sort ─────────────────────────────────────────────────────────────
let sorted = $models | sort-by display_name

# ── render ────────────────────────────────────────────────────────────────────
if $format == "json" {

  $sorted | to json

} else if $format == "csv" {

  $sorted | each {|m| {
    id:               $m.id
    display_name:     $m.display_name
    max_input_tokens: ($m.max_input_tokens? | default 0)
    max_output_tokens: ($m.max_tokens? | default 0)
    capabilities:     (get-caps $m)
    created_at:       $m.created_at
  }} | to csv

} else {

  $sorted | each {|m| {
    id:        $m.id
    name:      $m.display_name
    "ctx-in":  (humanize $m.max_input_tokens?)
    "ctx-out": (humanize $m.max_tokens?)
    caps:      (get-caps $m)
    created:   ($m.created_at | str substring 0..9)
  }} | table

}
'''
